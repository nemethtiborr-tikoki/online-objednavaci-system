services:
  - type: web
    name: online-objednavaci-system
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile
    startCommand: pnpm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        sync: false
      - key: OWNER_EMAIL
        sync: false
      - key: COMPANY_NAME
        sync: false
